<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Raw-to-display value mappings and scale analysis for OP-1 Field parameters. Highlights research gaps and uncharacterized scales.">
  <title>OP-1 Field — Display Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #EEEDE9; --surface: #FFFFFF; --border: #E0DDD7;
      --text: #1C1C1C; --muted: #9B9791; --header-bg: #1A1A1A;
      --orange: #FF4800; --blue: #0E8FE8; --purple: #8B5CF6; --green: #22C55E;

      /* Scale type colors */
      --c-percent:   #5B8DEF;
      --c-centered:  #A78BFA;
      --c-discrete:  #34D399;
      --c-selector:  #F59E0B;
      --c-hz:        #F97316;
      --c-tempo:     #EC4899;
      --c-inverse:   #14B8A6;
      --c-decimal:   #06B6D4;
    }
    body { font-family: 'JetBrains Mono','Courier New',monospace; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── HEADER ── */
    header { background: var(--header-bg); position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 16px rgba(0,0,0,.3); }
    .header-row { display: flex; align-items: center; gap: 10px; padding: 16px 32px 10px; }
    .site-title { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: .1em; text-decoration: none; }
    .site-title:hover { color: rgba(255,255,255,.8); }
    .site-sep { font-size: 13px; font-weight: 300; color: rgba(255,255,255,.2); }
    .site-sub { font-size: 12px; font-weight: 300; color: rgba(255,255,255,.42); letter-spacing: .03em; }
    .fw-tag { margin-left: auto; font-size: 9px; font-weight: 400; letter-spacing: .15em; color: rgba(255,255,255,.28); border: 1px solid rgba(255,255,255,.1); padding: 3px 8px 2px; border-radius: 2px; }
    .page-nav { display: flex; padding: 0 24px; border-top: 1px solid rgba(255,255,255,.06); gap: 2px; }
    .nav-btn { font-family: inherit; font-size: 10px; font-weight: 700; letter-spacing: .14em; color: rgba(255,255,255,.32); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; padding: 8px 12px 7px; text-decoration: none; display: inline-block; transition: color .15s, border-color .15s; }
    .nav-btn:hover { color: rgba(255,255,255,.72); }
    .nav-btn.active { color: #fff; border-bottom-color: var(--orange); }

    /* ── MAIN ── */
    main { max-width: 1100px; margin: 0 auto; padding: 28px 32px 80px; }

    h2 { font-size: 11px; font-weight: 700; letter-spacing: .18em; color: var(--muted); text-transform: uppercase; margin-bottom: 14px; }

    /* ── SCALE LEGEND ── */
    .legend-section { margin-bottom: 36px; padding-bottom: 28px; border-bottom: 1px solid var(--border); }
    .legend-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 400; color: var(--text); }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ── DISTRIBUTION BAR ── */
    .dist-section { margin-bottom: 36px; padding-bottom: 28px; border-bottom: 1px solid var(--border); }
    .dist-bar { display: flex; height: 20px; border-radius: 3px; overflow: hidden; gap: 2px; margin-bottom: 10px; }
    .dist-seg { height: 100%; min-width: 2px; border-radius: 2px; transition: opacity .15s; cursor: default; }
    .dist-seg:hover { opacity: .8; }
    .dist-labels { display: flex; flex-wrap: wrap; gap: 6px 14px; }
    .dist-label { font-size: 10px; font-weight: 300; color: var(--muted); display: flex; align-items: center; gap: 5px; }
    .dist-label-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dist-label strong { font-weight: 700; color: var(--text); }

    /* ── RESEARCH GAPS ── */
    .gaps-section { margin-bottom: 36px; padding-bottom: 28px; border-bottom: 1px solid var(--border); }
    .gap-list { display: flex; flex-direction: column; gap: 6px; }
    .gap-item { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid; border-radius: 3px; padding: 10px 14px; display: flex; gap: 12px; align-items: baseline; }
    .gap-item.priority-high   { border-left-color: #EF4444; }
    .gap-item.priority-medium { border-left-color: #F59E0B; }
    .gap-item.priority-low    { border-left-color: #9CA3AF; }
    .gap-key  { font-size: 11px; font-weight: 700; min-width: 160px; color: var(--text); }
    .gap-reason { font-size: 11px; font-weight: 300; color: var(--muted); }
    .gap-badge { font-size: 8px; font-weight: 700; letter-spacing: .12em; padding: 2px 5px 1px; border-radius: 2px; flex-shrink: 0; }
    .gap-badge.high   { background: rgba(239,68,68,.1);  color: #EF4444; }
    .gap-badge.medium { background: rgba(245,158,11,.1); color: #F59E0B; }
    .gap-badge.low    { background: rgba(156,163,175,.1);color: #6B7280; }

    /* ── PARAM TABLE ── */
    .table-section {}
    .table-controls { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .t-btn { font-family: inherit; font-size: 9px; font-weight: 700; letter-spacing: .14em; color: var(--muted); background: var(--surface); border: 1px solid var(--border); border-radius: 2px; cursor: pointer; padding: 4px 10px 3px; transition: all .12s; }
    .t-btn:hover { border-color: var(--text); color: var(--text); }
    .t-btn.active { background: var(--text); color: var(--surface); border-color: var(--text); }
    .param-table { width: 100%; border-collapse: collapse; }
    .param-table th { font-size: 9px; font-weight: 700; letter-spacing: .14em; color: var(--muted); text-align: left; padding: 6px 10px 5px; border-bottom: 2px solid var(--border); }
    .param-table td { font-size: 11px; font-weight: 400; padding: 6px 10px; border-bottom: 1px solid #F0EEE9; vertical-align: top; }
    .param-table tr:last-child td { border-bottom: none; }
    .param-table tr:hover td { background: #F8F7F4; }
    .engine-cell { font-weight: 700; white-space: nowrap; }
    .idx-cell { color: var(--muted); font-size: 10px; text-align: right; width: 28px; }
    .scale-chip { display: inline-block; font-size: 8px; font-weight: 700; letter-spacing: .1em; padding: 2px 6px 1px; border-radius: 2px; white-space: nowrap; }
    .samples-cell { font-size: 10px; font-weight: 300; color: var(--muted); }
    .sample-pair { display: inline-block; margin-right: 8px; white-space: nowrap; }
    .sample-pair .raw { color: #9B9791; }
    .sample-pair .arrow { margin: 0 2px; }
    .sample-pair .disp { color: var(--text); font-weight: 700; }
    .notes-cell { font-size: 10px; font-weight: 300; color: var(--muted); font-style: italic; max-width: 240px; }
    .warn-cell { font-size: 9px; font-weight: 700; letter-spacing: .08em; color: #EF4444; }

    /* ── SCALE TYPE CHIP COLORS ── */
    .chip-percent   { background: rgba(91,141,239,.1);  color: var(--c-percent); }
    .chip-centered  { background: rgba(167,139,250,.1); color: var(--c-centered); }
    .chip-discrete  { background: rgba(52,211,153,.1);  color: var(--c-discrete); }
    .chip-selector  { background: rgba(245,158,11,.1);  color: var(--c-selector); }
    .chip-hz        { background: rgba(249,115,22,.1);  color: var(--c-hz); }
    .chip-tempo     { background: rgba(236,72,153,.1);  color: var(--c-tempo); }
    .chip-inverse   { background: rgba(20,184,166,.1);  color: var(--c-inverse); }
    .chip-decimal   { background: rgba(6,182,212,.1);   color: var(--c-decimal); }


    /* ── MINI BAR (inline % visualization for percent/centered) ── */
    .mini-bar-wrap { display: flex; align-items: center; gap: 6px; }
    .mini-bar { flex: 1; max-width: 80px; height: 3px; background: var(--border); border-radius: 2px; position: relative; }
    .mini-bar-fill { height: 100%; border-radius: 2px; }

    /* ── FOOTER ── */
    footer { text-align: center; padding: 32px; font-size: 11px; font-weight: 300; color: var(--muted); letter-spacing: .04em; }
    footer a { color: var(--muted); text-decoration: none; border-bottom: 1px solid var(--border); }
    footer a:hover { color: var(--text); }

    @media (max-width: 640px) {
      .header-row { padding: 12px 16px 8px; }
      .site-sub { display: none; }
      main { padding: 20px 16px 60px; }
      .param-table .notes-cell { display: none; }
    }
  </style>
</head>
<body>
<header>
  <div class="header-row">
    <a href="index.html" class="site-title">OP-1 FIELD</a>
    <span class="site-sep">//</span>
    <span class="site-sub">display notes</span>
    <span class="fw-tag" id="fw-tag"></span>
  </div>
  <nav class="page-nav" aria-label="Site navigation">
    <a href="index.html" class="nav-btn">HOME</a>
    <a href="params.html" class="nav-btn">PARAMS</a>
    <a href="display.html" class="nav-btn active">DISPLAY NOTES</a>
  </nav>
</header>

<main>

  <!-- SECTION 1: SCALE TYPE LEGEND -->
  <section class="legend-section">
    <h2>Scale types</h2>
    <div class="legend-grid" id="legend"></div>
  </section>

  <!-- SECTION 2: DISTRIBUTION -->
  <section class="dist-section">
    <h2>Parameter distribution by scale type</h2>
    <div class="dist-bar" id="dist-bar"></div>
    <div class="dist-labels" id="dist-labels"></div>
  </section>

  <!-- SECTION 3: RESEARCH GAPS -->
  <section class="gaps-section">
    <h2>Research gaps</h2>
    <div class="gap-list" id="gap-list"></div>
  </section>

  <!-- SECTION 4: FULL PARAMETER TABLE -->
  <section class="table-section">
    <h2>All parameters</h2>
    <div class="table-controls" id="table-controls"></div>
    <table class="param-table" id="param-table">
      <thead>
        <tr>
          <th>ENGINE</th>
          <th style="width:28px">#</th>
          <th>NAME</th>
          <th>SCALE</th>
          <th>KNOWN SAMPLES (raw &rarr; display)</th>
          <th class="notes-cell">NOTES</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </section>

</main>

<footer id="footer"></footer>

<script>
  const FW = '1.7.3';
  document.getElementById('fw-tag').textContent = 'fw ' + FW;
  document.getElementById('footer').innerHTML =
    'Reverse-engineered against OP-1 Field firmware&nbsp;' + FW +
    ' &middot; <a href="https://github.com/jstnfst/te-op1">github.com/jstnfst/te-op1</a>';

  // ── SCALE TYPE DEFINITIONS ──────────────────────────────
  const SCALE_META = {
    percent:   { label: '%',             desc: 'Unipolar 0–100%; raw 0=0, raw 32767=100',        color: '#5B8DEF' },
    centered:  { label: 'centered %',    desc: 'Bipolar, centered at 0; can be negative raw',    color: '#A78BFA' },
    discrete:  { label: 'discrete',      desc: 'Stepped integer display (0–N or 1–N)',            color: '#34D399' },
    selector:  { label: 'selector',      desc: 'Named discrete options (context-dependent)',      color: '#F59E0B' },
    hz:        { label: 'hz (log)',       desc: 'Logarithmic Hz scale; not linear percentage',    color: '#F97316' },
    tempo:     { label: 'tempo dial',    desc: 'Non-linear BPM/tempo dial; no simple formula',   color: '#EC4899' },
    inverse:   { label: 'ms inverse',    desc: 'Lower raw = more time; delay range in ms',       color: '#14B8A6' },
    decimal:   { label: 'decimal',       desc: 'Continuous decimal scale between two bounds',    color: '#06B6D4' },
  };

  // ── PARAMETER DATA ──────────────────────────────────────
  // Each entry: [engine, idx, name, scaleType, samples[], notes, warn]
  // samples: [[raw, display], ...]  — display can be number or string
  // warn: optional warning string
  const DATA = [
    // synth.amp — confirmed linear % (oracle capture 12)
    ['synth.amp', 0, 'VOLUME',     'percent',   [[16415, 50]], 'confirmed linear % (oracle capture 12)'],
    ['synth.amp', 1, 'COMPRESSOR', 'percent',   [[16416, 50]], 'confirmed linear % (oracle capture 12)'],
    ['synth.amp', 2, 'TONE',       'percent',   [[16704, 51]], 'confirmed linear % (oracle capture 12)'],
    ['synth.amp', 3, 'DRIVE',      'percent',   [[16384, 50]], 'confirmed linear % (oracle capture 12)'],

    // synth.cluster — oracle min (min0) + max (synthmax(2)) confirmed
    ['synth.cluster', 0, 'WAVE NUMBER', 'percent',   [[3072,'min'],[17408,'max']], 'hardware min=3072, max=17408 (oracle); does not span full 0–32767'],
    ['synth.cluster', 1, 'WAVE ENV', 'percent',   [[0,'min'],[32767,'max']], 'hardware min=0, max=32767 (oracle)'],
    ['synth.cluster', 2, 'SPREAD',   'percent',   [[512,'min'],[24064,'max']], 'hardware min=512, max=24064 (oracle); does not span full 0–32767'],
    ['synth.cluster', 3, 'UNITOR',   'percent',  [[3,0],[1638,100]], 'linear %; hardware min=3, max=1638 (oracle)'],

    // synth.digital — oracle min (min1.aif) + max (synthmax(3).aif) confirmed
    ['synth.digital', 0, 'WAVE SHAPER',    'percent',   [[0,'min'],[32767,'max']], 'hardware min=0, max=32767 (oracle); display unit unknown'],
    ['synth.digital', 1, 'OCTAVE',         'discrete', [[2048, 0],[19712, 4],[26624, 6]], '0–6 inclusive; hardware min=2048, max=26624 (oracle)'],
    ['synth.digital', 2, 'DETUNE+RINGMOD', 'centered', [[-32768,'min'],[-10369, 33]], 'bipolar; hardware min=-32768'],
    ['synth.digital', 3, 'DIGITALNESS',    'percent',   [[0,'min'],[32767,'max']], 'hardware min=0, max=32767 (oracle); display unit unknown'],

    // synth.dimension — oracle min (dimension-minmax(1).aif) + max (dimension-minmax(2).aif) confirmed
    ['synth.dimension', 0, 'WAVEFORM',    'percent', [[0,'min'],[32767,'max']], 'hardware min=0, max=32767 (oracle)'],
    ['synth.dimension', 1, 'STEREO',      'percent', [[0,'min'],[32767,'max']], 'hardware min=0, max=32767 (oracle)'],
    ['synth.dimension', 2, 'FILTER CUTOFF FREQ', 'hz',     [[13742, '1320 Hz']], 'log Hz scale'],
    ['synth.dimension', 3, 'RESONANCE',          'percent', [[0,'min'],[32767,'max']], 'hardware min=0, max=32767 (oracle)'],

    // synth.dna — oracle min (min2.aif) + max (synthmax(5).aif) confirmed
    ['synth.dna', 0, 'FILTER',        'centered', [[-29491,-90],[32767,100]], 'centered %; formula raw/32767×100; hardware min=−29491 (−90%), max=32767 (+100%) (oracle dna-filter-minmax)'],
    ['synth.dna', 1, 'WAVE NUMBER',   'percent',   [[4608,'min'],[12800,'max']], 'hardware min=4608, max=12800 (oracle synthmax(5)); limited range'],
    ['synth.dna', 2, 'WAVE MODIFIER', 'percent',   [[32767,'max']], 'hardware max=32767 (notes)'],
    ['synth.dna', 3, 'NOISE',         'percent',   [[0,'min'],[32767,'max']], 'hardware min=0, max=32767 (oracle)'],

    // synth.drwave
    ['synth.drwave', 0, 'WAVE TYPE AND LENGTH', 'discrete', [[14209, 57],[24568, 98]], '0–98; hardware max=24568 (oracle synthmax(6)); encodes wave type + length'],
    ['synth.drwave', 1, 'FILTER',               'discrete', [[11735, 70],[16379, 98]], '0–98; hardware max=16379 (oracle)'],
    ['synth.drwave', 2, 'PHASE',                'discrete', [[8199, 49],[16377, 98]],  '0–98; hardware max=16377 (oracle)'],
    ['synth.drwave', 3, 'CHORUS',               'discrete', [[0, 0],[32767, 99]],      '0–99 (100 steps)'],

    // synth.dsynth — all knobs linear 0–32767 (oracle min capture 1 + synthmax(7))
    ['synth.dsynth', 0, 'ENVELOPE CROSSFADER', 'percent', [[0,'min'],[32767,'max']], 'linear knob; range 0–32767 (oracle)'],
    ['synth.dsynth', 1, 'WAVEFORM 1',          'percent', [[0,'min'],[32767,'max']], 'linear knob; range 0–32767 (oracle)'],
    ['synth.dsynth', 2, 'ENVELOPE 1',          'percent', [[0,'min'],[32767,'max']], 'linear knob; range 0–32767 (oracle)'],
    ['synth.dsynth', 3, 'CROSS MODULATION',    'percent', [[0,'min'],[32767,'max']], 'linear knob; range 0–32767 (oracle)'],
    ['synth.dsynth', 4, 'FREQUENCY',           'percent', [[0,'min'],[32767,'max']], 'linear knob; range 0–32767 (oracle)'],
    ['synth.dsynth', 5, 'WAVEFORM 2',          'percent', [[0,'min'],[32767,'max']], 'linear knob; range 0–32767 (oracle)'],
    ['synth.dsynth', 6, 'ENVELOPE 2',          'percent', [[0,'min'],[32767,'max']], 'linear knob; range 0–32767 (oracle)'],
    ['synth.dsynth', 7, 'CUTOFF',              'percent', [[0,'min'],[32767,'max']], 'linear knob; range 0–32767 (oracle)'],

    // synth.fm — oracle min confirmed (min3.aif); indices 0–3 user-facing; indices 4–7 firmware-managed constants (15000/0/100/1500)
    ['synth.fm', 0, 'FM AMOUNT',  'discrete', [[31743, 95]],          '0–99'],
    ['synth.fm', 1, 'FREQUENCY',  'discrete', [[17352, 52]],          '0–99'],
    ['synth.fm', 2, 'TOPOLOGY',   'selector', [[1024,'min'],[13312, 6],[17408,'max']],'hardware min=1024, max=17408 (oracle); 9 options; non-linear raw mapping'],
    ['synth.fm', 3, 'DETUNE',     'discrete', [[0, 0]],               '0–99'],

    // synth.phase — oracle min (raw 0 confirmed) + max (synthmax(9).aif) confirmed for indices 0/2/3
    ['synth.phase', 0, 'PHASE SHIFT',       'percent', [[0, 0],[32767,'max']], 'hardware min=0, max=32767 (oracle synthmax(9))'],
    ['synth.phase', 1, 'DISTORTION AMOUNT', 'percent', [[14310, 44],[29491, 90]],  'hardware max=29491 (oracle synthmax(9)); does not reach 32767'],
    ['synth.phase', 2, 'PHASE FILTER',      'percent', [[0, 0],[32767,'max']], 'hardware min=0, max=32767 (oracle synthmax(9))'],
    ['synth.phase', 3, 'PHASE TILT',        'percent', [[0, 0],[32767,'max']], 'hardware min=0, max=32767 (oracle synthmax(9))'],

    // synth.pulse
    ['synth.pulse', 0, 'FILTER',       'percent',   [[18848, 57]],  'hardware max=23168 (oracle synthmax(10))'],
    ['synth.pulse', 1, 'AMPLITUDE',    'percent',   [[3984, 12]],   'hardware max=16384 (oracle)'],
    ['synth.pulse', 2, 'PULSE TWO',    'percent',   [[10752, 33]],  'hardware max=16384 (oracle)'],
    ['synth.pulse', 3, 'MODULATION',   'centered', [[-16384,-100],[-6144,-38],[16384,100]], 'centered %; symmetric range −16384–+16384 (oracle pulse-modulation-minmax)'],

    // synth.sampler
    ['synth.sampler', 0, 'START',     'percent',   [[0,'min'],[32766,'max']],              'linear %; hardware min=0, max=32766 (notes)'],
    ['synth.sampler', 1, 'LOOP IN',   'percent',   [[0,'min'],[9821,30],[32767,'max']],    'linear %; raw 9821≈30% (notes, approx)'],
    ['synth.sampler', 2, 'LOOP OUT',  'percent',   [[0,'min'],[18033,55],[32767,'max']],   'linear %; raw 18033≈55% (notes, approx)'],
    ['synth.sampler', 3, 'END',       'percent',   [[0,'min'],[31301,96],[32767,'max']],   'linear %; raw 31301≈96% (notes, approx)'],
    ['synth.sampler', 4, 'DIRECTION', 'selector', [[12000, 'forward']],                  'forward / reverse; larger raw = reverse'],
    ['synth.sampler', 5, 'FINE TUNE', 'percent',   [[0,'min'],[30195,92],[32767,'max']],   'linear %; raw 30195≈92% (notes, approx)'],
    ['synth.sampler', 6, 'LOOP FADE', 'percent',   [[0,'min'],[9103,28],[32767,'max']],    'linear %; raw 9103≈28% (notes, approx)'],
    ['synth.sampler', 7, 'GAIN',      'percent',   [[0,'min'],[8192,25],[32767,'max']],    'linear %; raw 8192≈25%; hardware max=32767 (notes)'],

    // synth.string — oracle min confirmed (min4.aif)
    ['synth.string', 0, 'TENSION',      'percent',    [[64,'min'],[3392, 10],[8256,'max']], 'hardware min=64, max=8256 (oracle); narrow range'],
    ['synth.string', 1, 'DECAY',         'percent', [[24064, 'max']],    'max at raw 24064; hardware min=512 (not 0); silence below min'],
    ['synth.string', 2, 'DETUNE',       'percent',    [[16384, 50]],       ''],
    ['synth.string', 3, 'IMPULSE TYPE', 'percent',     [[8256,0],[16448,100]], 'linear %; hardware min=8256, max=16448 (oracle)'],

    // synth.vocoder — index 3 MIX max confirmed (synthmax(11).aif)
    ['synth.vocoder', 0, 'WAVEFORM', 'selector', [[0, 'S']],  '8 options: S,1,2,3,4,5,6,N'],
    ['synth.vocoder', 1, 'FORMANT',  'discrete', [[0, -4]],   '-4 to +4 (9 steps); raw 0 = min (-4), not center'],
    ['synth.vocoder', 2, 'BANDS',    'discrete', [[0, 0]],    '0–7 (8 steps)'],
    ['synth.vocoder', 3, 'MIX',      'percent',   [[0, 0],[32767,'max']], 'hardware min=0, max=32767 (oracle synthmax(11))'],

    // synth.voltage — confirmed linear % (oracle captures 13+14)
    ['synth.voltage', 0, 'AMPERE MODULATION', 'percent', [[16383, 50],[26623, 81]], 'confirmed linear % (oracle captures 13+14)'],
    ['synth.voltage', 1, 'GROUND NOISE',      'percent', [[14336, 44],[26623, 81]], 'confirmed linear % (oracle captures 13+14)'],
    ['synth.voltage', 2, 'PHASE FILTER',      'percent', [[20992, 64],[29183, 89]], 'confirmed linear % (oracle captures 13+14)'],
    ['synth.voltage', 3, 'VOLTAGE DETUNE',    'percent', [[16384, 50],[26112, 80]], 'confirmed linear % (oracle captures 13+14)'],

    // fx.cwo
    ['fx.cwo', 0, 'FREQUENCY', 'percent', [[16366, 50]], '~linear; raw 16366→50%'],
    ['fx.cwo', 1, 'DELAY',     'percent', [[16677, 50]], '~linear'],
    ['fx.cwo', 2, 'FEEDBACK',  'percent', [[16610, 50]], '~linear'],
    ['fx.cwo', 3, 'SIDEBAND',  'percent', [[15345, 50]], '~linear'],

    // fx.delay — oracle min (fx0.aif) + max (fx-max(2).aif) confirmed for index 3
    ['fx.delay', 0, 'RANGE',    'inverse',  [[8000, '125 ms']], 'lower raw = more delay; 31.25–1000 ms range'],

  // ── RENDER: LEGEND ──────────────────────────────────────
  const legendEl = document.getElementById('legend');
  Object.entries(SCALE_META).forEach(([type, meta]) => {
    legendEl.innerHTML += `<div class="legend-item">
      <div class="legend-dot" style="background:${meta.color}"></div>
      <span><strong>${meta.label}</strong> — ${meta.desc}</span>
    </div>`;
  });

  // ── RENDER: DISTRIBUTION ────────────────────────────────
  const counts = {};
  DATA.forEach(([,,, type]) => { counts[type] = (counts[type] || 0) + 1; });
  const total = DATA.length;
  const barEl = document.getElementById('dist-bar');
  const labelsEl = document.getElementById('dist-labels');
  Object.entries(SCALE_META).forEach(([type, meta]) => {
    const n = counts[type] || 0;
    if (!n) return;
    const pct = (n / total * 100).toFixed(1);
    barEl.innerHTML += `<div class="dist-seg" style="background:${meta.color};flex:${n}" title="${meta.label}: ${n} params (${pct}%)"></div>`;
    labelsEl.innerHTML += `<div class="dist-label">
      <div class="dist-label-dot" style="background:${meta.color}"></div>
      <strong>${n}</strong>&nbsp;${meta.label}
    </div>`;
  });

  // ── RENDER: GAPS ────────────────────────────────────────
  const gapListEl = document.getElementById('gap-list');
  GAPS.forEach(g => {
    gapListEl.innerHTML += `<div class="gap-item priority-${g.priority}">
      <span class="gap-badge ${g.priority}">${g.priority.toUpperCase()}</span>
      <span class="gap-key">${g.key}</span>
      <span class="gap-reason">${g.reason}</span>
    </div>`;
  });
  if (GAPS.length === 0) {
    document.querySelector('.gaps-section').style.display = 'none';
  }

  // ── RENDER: TABLE ───────────────────────────────────────
  let activeFilter = 'all';

  function chipFor(type) {
    const c = SCALE_META[type] || { label: type, color: '#6B7280' };
    return `<span class="scale-chip chip-${type}">${c.label}</span>`;
  }

  function samplesHtml(samples) {
    if (!samples.length) return '<span style="color:#C8C5BF">—</span>';
    return samples.map(([raw, disp]) =>
      `<span class="sample-pair"><span class="raw">${raw}</span><span class="arrow">→</span><span class="disp">${disp}</span></span>`
    ).join('');
  }

  function renderTable(filter) {
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = '';
    DATA.forEach(([engine, idx, name, type, samples, notes, warn]) => {
      const [group] = engine.split('.');
      if (filter !== 'all' && filter !== type && filter !== group) return;
      const row = document.createElement('tr');
      row.innerHTML = `
        <td class="engine-cell">${engine}</td>
        <td class="idx-cell">${idx}</td>
        <td>${name}</td>
        <td>${chipFor(type)}</td>
        <td class="samples-cell">${samplesHtml(samples)}</td>
        <td class="notes-cell">${warn ? `<span class="warn-cell">${warn}</span>` : (notes || '—')}`;
      tbody.appendChild(row);
    });
  }

  // Table filter buttons
  const controlsEl = document.getElementById('table-controls');
  const filterOptions = [
    { key: 'all', label: 'ALL' },
    { key: 'synth', label: 'SYNTH' },
    { key: 'fx', label: 'FX' },
    { key: 'lfo', label: 'LFO' },
    { key: 'adsr', label: 'ADSR' },
    ...Object.entries(SCALE_META).map(([k, m]) => ({ key: k, label: m.label.toUpperCase() }))
  ];
  filterOptions.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 't-btn' + (opt.key === 'all' ? ' active' : '');
    btn.textContent = opt.label;
    btn.dataset.f = opt.key;
    btn.addEventListener('click', () => {
      activeFilter = opt.key;
      document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTable(activeFilter);
    });
    controlsEl.appendChild(btn);
  });

  renderTable('all');
</script>
