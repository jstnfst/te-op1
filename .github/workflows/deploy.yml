name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Avoid overlapping deploys clobbering each other.
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Apply D1 migrations (remote)
        run: npx wrangler d1 migrations apply te-op1-db --remote

      - name: Deploy to Pages
        run: npx wrangler pages deploy ./dist --project-name te-op1 --branch master
