<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interactive OP-1 Field patch viewer. Load a preset JSON and explore its synth engine, ADSR envelope, and every knob, FX, and LFO parameter — edited live in both directions.">
  <title>OP-1 Field — Patch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #EEEDE9; --surface: #FFFFFF; --border: #E0DDD7;
      --text: #1C1C1C; --muted: #9B9791; --header-bg: #1A1A1A;
      --orange: #FF4800; --blue: #0E8FE8; --purple: #8B5CF6; --green: #22C55E;

      --c-percent:   #5B8DEF;
      --c-centered:  #A78BFA;
      --c-discrete:  #34D399;
      --c-selector:  #F59E0B;
      --c-hz:        #F97316;
      --c-tempo:     #EC4899;
      --c-inverse:   #14B8A6;
      --c-decimal:   #06B6D4;

      /* JSON token colors */
      --tok-key: #C2410C; --tok-str: #15803D; --tok-num: #1D4ED8;
      --tok-bool: #9333EA; --tok-punct: #9B9791;
    }
    body { font-family: 'JetBrains Mono','Courier New',monospace; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── HEADER ── */
    header { background: var(--header-bg); position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 16px rgba(0,0,0,.3); }
    .header-row { display: flex; align-items: center; gap: 10px; padding: 16px 32px 10px; }
    .site-title { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: .1em; text-decoration: none; }
    .site-title:hover { color: rgba(255,255,255,.8); }
    .site-sep { font-size: 13px; font-weight: 300; color: rgba(255,255,255,.2); }
    .site-sub { font-size: 12px; font-weight: 300; color: rgba(255,255,255,.42); letter-spacing: .03em; }
    .fw-tag { margin-left: auto; font-size: 9px; font-weight: 400; letter-spacing: .15em; color: rgba(255,255,255,.28); border: 1px solid rgba(255,255,255,.1); padding: 3px 8px 2px; border-radius: 2px; }
    .page-nav { display: flex; padding: 0 24px; border-top: 1px solid rgba(255,255,255,.06); gap: 2px; }
    .nav-btn { font-family: inherit; font-size: 10px; font-weight: 700; letter-spacing: .14em; color: rgba(255,255,255,.32); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; padding: 8px 12px 7px; text-decoration: none; display: inline-block; transition: color .15s, border-color .15s; }
    .nav-btn:hover { color: rgba(255,255,255,.72); }
    .nav-btn.active { color: #fff; border-bottom-color: var(--orange); }

    /* ── MAIN ── (full-width workspace, unlike the centered reference pages) */
    main { max-width: none; margin: 0; padding: 24px 32px 80px; }
    h2 { font-size: 11px; font-weight: 700; letter-spacing: .18em; color: var(--muted); text-transform: uppercase; margin-bottom: 14px; }

    a:focus-visible, button:focus-visible, select:focus-visible, input:focus-visible,
    textarea:focus-visible, [tabindex]:focus-visible {
      outline: 2px solid var(--orange); outline-offset: 2px;
    }

    /* ── IDENTITY STRIP ── */
    .identity { display: flex; align-items: center; gap: 22px; padding: 18px 22px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 6px; margin-bottom: 18px; }
    .id-art { width: 120px; height: 72px; flex-shrink: 0; color: var(--text); }
    .engine-svg { width: 100%; height: 100%; }
    .engine-svg .ac { stroke: var(--orange); }
    .engine-svg .acf { fill: var(--orange); }
    .id-fields { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 0; }
    .id-name { font-size: 26px; font-weight: 800; letter-spacing: .01em; color: var(--text); background: transparent;
      border: none; border-bottom: 2px dashed transparent; font-family: inherit; width: 100%; padding: 2px 0; }
    .id-name:hover { border-bottom-color: var(--border); }
    .id-name:focus { outline: none; border-bottom-color: var(--orange); }
    .id-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; font-size: 11px; color: var(--muted); }
    .id-engine { font-weight: 800; letter-spacing: .14em; text-transform: uppercase; color: var(--orange); font-size: 12px; }
    .id-meta select { font-family: inherit; font-size: 10px; font-weight: 700; letter-spacing: .06em; color: var(--text);
      background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 3px 6px; cursor: pointer; }
    .id-meta .lbl { letter-spacing: .12em; text-transform: uppercase; font-weight: 700; font-size: 9px; }

    /* ── WORKSPACE ── */
    /* Widest: 4 columns — editor | (ADSR + synth) | (effect + LFO) | keyboard */
    .workspace { display: grid; grid-template-columns: minmax(340px, 0.85fr) minmax(0, 2.6fr); gap: 22px; align-items: start; }

    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 18px; }

    /* ── EDITOR ── */
    .editor-toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
    .editor-toolbar select, .btn {
      font-family: inherit; font-size: 10px; font-weight: 700; letter-spacing: .08em; color: var(--text);
      background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 6px 10px; cursor: pointer;
    }
    .btn:hover, .editor-toolbar select:hover { border-color: var(--text); }
    .btn { text-transform: uppercase; }
    .editor-wrap { position: relative; height: 460px; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; background: #FBFAF7; }
    .editor-wrap.drag { border-color: var(--orange); box-shadow: inset 0 0 0 2px rgba(255,72,0,.25); }
    .code-layer {
      position: absolute; inset: 0; margin: 0; border: 0;
      font-family: 'JetBrains Mono','Courier New',monospace; font-size: 12.5px; line-height: 1.55;
      letter-spacing: 0; tab-size: 2; padding: 14px 16px;
      white-space: pre; overflow: auto; word-wrap: normal;
    }
    #jsonHighlight { color: var(--text); pointer-events: none; z-index: 1; }
    #jsonInput { z-index: 2; resize: none; background: transparent; color: transparent; caret-color: var(--orange); outline: none; }
    #jsonInput::selection { background: rgba(255,72,0,.18); }
    .tok-key { color: var(--tok-key); } .tok-str { color: var(--tok-str); }
    .tok-num { color: var(--tok-num); } .tok-bool { color: var(--tok-bool); }
    .tok-punct { color: var(--tok-punct); }
    .editor-status { margin-top: 10px; font-size: 11px; font-weight: 400; min-height: 16px; }
    .editor-status.ok { color: var(--green); } .editor-status.err { color: var(--orange); }
    .editor-hint { margin-top: 6px; font-size: 10px; font-weight: 300; color: var(--muted); }

    /* ── VIZ PANEL ── (3 inner columns → 4 total with the editor) */
    .viz { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; align-items: start; }
    .viz-col { display: flex; flex-direction: column; gap: 22px; min-width: 0; }

    /* ── ADSR SCOPE (signature) ── */
    .scope-card { background: var(--header-bg); border-radius: 6px; padding: 16px 16px 12px; border: 1px solid #000; }
    .scope-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; }
    .scope-title { font-size: 10px; font-weight: 700; letter-spacing: .2em; color: rgba(255,255,255,.5); text-transform: uppercase; }
    .scope-sub { font-size: 9px; font-weight: 300; color: rgba(255,255,255,.32); letter-spacing: .05em; }
    .scope-svg { width: 100%; aspect-ratio: 560 / 200; display: block; touch-action: none; }
    .env-grid { stroke: rgba(255,255,255,.07); stroke-width: 1; }
    .env-fill { fill: rgba(255,72,0,.12); stroke: none; }
    .env-line { fill: none; stroke: var(--orange); stroke-width: 2.5; stroke-linejoin: round; stroke-linecap: round;
      filter: drop-shadow(0 0 5px rgba(255,72,0,.6)); }
    .env-glow { animation: envpulse 2.6s ease-in-out infinite; }
    @keyframes envpulse { 0%,100% { opacity: 1; } 50% { opacity: .82; } }
    .handle { fill: var(--header-bg); stroke: var(--orange); stroke-width: 2.5; cursor: grab; transition: r .12s; }
    .handle:hover, .handle:focus-visible { r: 9; fill: var(--orange); outline: none; }
    .handle:active { cursor: grabbing; }
    .scope-readout { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 10px; }
    .ro { font-size: 9px; letter-spacing: .04em; color: rgba(255,255,255,.4); }
    .ro b { display: block; font-size: 11px; color: #fff; font-weight: 700; letter-spacing: 0; margin-top: 1px; }
    .ro .rd { color: var(--orange); }

    /* ── PARAM GROUPS ── */
    .pgroup { } /* spacing handled by the .viz-col flex gap */
    .pgroup-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .pgroup-head h2 { margin: 0; }
    .pgroup-engine { font-size: 10px; font-weight: 700; letter-spacing: .1em; color: var(--text); }
    .pgroup-head select { font-family: inherit; font-size: 10px; font-weight: 700; color: var(--text);
      background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 3px 6px; cursor: pointer; }
    .toggle { margin-left: auto; font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      display: inline-flex; align-items: center; gap: 6px; color: var(--muted); cursor: pointer; user-select: none; }
    .toggle input { accent-color: var(--orange); cursor: pointer; }
    .pgroup.off { opacity: .45; }

    .prow { padding: 9px 0; border-bottom: 1px solid #F0EEE9; }
    .prow:last-child { border-bottom: none; }
    .prow-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .pname { font-size: 11px; font-weight: 700; letter-spacing: .02em; }
    .pidx { font-size: 9px; color: var(--muted); }
    .pval { margin-left: auto; font-size: 11px; font-weight: 700; color: var(--text); }
    .scale-chip { display: inline-block; font-size: 8px; font-weight: 700; letter-spacing: .1em; padding: 2px 6px 1px; border-radius: 2px; white-space: nowrap; }
    .chip-percent { background: rgba(91,141,239,.12); color: var(--c-percent); }
    .chip-centered { background: rgba(167,139,250,.12); color: var(--c-centered); }
    .chip-discrete { background: rgba(52,211,153,.12); color: var(--c-discrete); }
    .chip-selector { background: rgba(245,158,11,.12); color: var(--c-selector); }
    .chip-hz { background: rgba(249,115,22,.12); color: var(--c-hz); }
    .chip-tempo { background: rgba(236,72,153,.12); color: var(--c-tempo); }
    .chip-inverse { background: rgba(20,184,166,.12); color: var(--c-inverse); }
    .chip-decimal { background: rgba(6,182,212,.12); color: var(--c-decimal); }
    .prow-ctl { display: flex; align-items: center; gap: 12px; }
    .prow-ctl input[type=range] { flex: 1; accent-color: var(--orange); height: 4px; cursor: pointer; min-width: 0; }
    .rawin { width: 78px; font-family: inherit; font-size: 11px; font-weight: 700; text-align: right; color: var(--text);
      background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 4px 6px; }
    .rawin:focus { outline: none; border-color: var(--orange); }
    .pselect { width: 100%; font-family: inherit; font-size: 11px; font-weight: 700; color: var(--text);
      background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 5px 8px; cursor: pointer; }

    /* ── DBOX SUMMARY ── */
    .dbox-note { background: #FFF6F0; border: 1px solid #F4D9C8; border-radius: 6px; padding: 14px 16px;
      font-size: 11px; font-weight: 300; color: #8A4B2A; line-height: 1.6; }
    .dbox-note b { font-weight: 700; }
    .dyna-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 14px; }
    .dyna-cell { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 10px 12px; }
    .dyna-cell .dn { font-size: 9px; font-weight: 700; letter-spacing: .12em; color: var(--muted); text-transform: uppercase; }
    .dyna-cell .dv { font-size: 16px; font-weight: 800; color: var(--text); margin-top: 3px; }
    .dyna-cell .dr { font-size: 9px; color: var(--muted); margin-top: 2px; }

    /* ── FOOTER ── */
    footer { text-align: center; padding: 32px; font-size: 11px; font-weight: 300; color: var(--muted); letter-spacing: .04em; }
    footer a { color: var(--muted); text-decoration: none; border-bottom: 1px solid var(--border); }
    footer a:hover { color: var(--text); }

    /* Large: 3 columns — editor | viz(2 cols, groups wrap) */
    @media (max-width: 1500px) {
      .viz { grid-template-columns: 1fr 1fr; }
    }
    /* Medium: 2 columns — editor | stacked viz */
    @media (max-width: 1180px) {
      .workspace { grid-template-columns: minmax(340px, 0.9fr) minmax(0, 1.7fr); }
      .viz { grid-template-columns: 1fr; }
    }
    /* Narrow: single column, editor on top */
    @media (max-width: 920px) {
      .workspace { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .header-row { padding: 12px 16px 8px; }
      .site-sub { display: none; }
      main { padding: 18px 16px 60px; }
      .identity { flex-direction: column; align-items: flex-start; gap: 14px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .env-glow { animation: none; }
      * { transition: none !important; }
    }
  </style>
</head>
<body>
<header>
  <div class="header-row">
    <a href="index.html" class="site-title">OP-1 FIELD</a>
    <span class="site-sep">//</span>
    <span class="site-sub">patch</span>
    <span class="fw-tag" id="fw-tag"></span>
  </div>
  <nav class="page-nav" aria-label="Site navigation">
    <a href="index.html" class="nav-btn">HOME</a>
    <a href="params.html" class="nav-btn">LAYOUT</a>
    <a href="display.html" class="nav-btn">MAPPINGS</a>
    <a href="patch.html" class="nav-btn active">PATCH</a>
  </nav>
</header>

<main>
  <!-- IDENTITY STRIP -->
  <section class="identity">
    <div class="id-art" id="idArt" aria-hidden="true"></div>
    <div class="id-fields">
      <input class="id-name" id="nameInput" aria-label="Patch name" autocomplete="off" spellcheck="false">
      <div class="id-meta">
        <span class="id-engine" id="idEngine">—</span>
        <span class="lbl">octave</span>
        <select id="octSel" aria-label="Octave">
          <option value="-4">-4</option><option value="-3">-3</option>
          <option value="-2">-2</option><option value="-1">-1</option>
          <option value="0">0</option><option value="1">+1</option>
          <option value="2">+2</option><option value="3">+3</option><option value="4">+4</option>
        </select>
      </div>
    </div>
  </section>

  <div class="workspace">
    <!-- LEFT: JSON EDITOR -->
    <section class="panel" aria-label="Preset JSON editor">
      <div class="editor-toolbar">
        <select id="sampleSel" aria-label="Load a sample preset"></select>
        <button class="btn" id="openBtn" type="button">Open .json</button>
        <input type="file" id="fileInput" accept=".json,application/json" hidden>
      </div>
      <div class="editor-wrap" id="editorWrap">
        <pre class="code-layer" id="jsonHighlight" aria-hidden="true"><code></code></pre>
        <textarea class="code-layer" id="jsonInput" spellcheck="false" autocomplete="off"
          autocorrect="off" autocapitalize="off" wrap="off" aria-label="Preset JSON"></textarea>
      </div>
      <div class="editor-status" id="status"></div>
      <div class="editor-hint">Edit the JSON directly, drop a <b>.json</b> file here, or pick a sample. Changes sync live with the controls. Keys are re-sorted alphabetically as the OP-1 firmware requires.</div>
    </section>

    <!-- RIGHT: VISUALIZATION -->
    <section class="viz" id="viz" aria-label="Patch visualization"></section>
  </div>
</main>

<footer id="footer"></footer>

<script>
/* ===================================================================
   OP-1 Field — Patch page
   Standalone. Data baked inline (matches the rest of the site).
   =================================================================== */
const FW = '1.7.3';
document.getElementById('fw-tag').textContent = 'fw ' + FW;
document.getElementById('footer').innerHTML =
  'OP-1 Field firmware&nbsp;' + FW +
  ' &middot; <a href="https://github.com/jstnfst/te-op1">github.com/jstnfst/te-op1</a>';

/* ── Engine catalogues ───────────────────────────────────── */
const SYNTH_TYPES = ['amp','cluster','dbox','digital','dimension','dna','drwave','dsynth','fm','phase','pulse','sampler','string','vocoder','voltage'];
const FX_TYPES   = ['cwo','delay','grid','mother','nitro','phone','punch','spring','terminal'];
const LFO_TYPES  = ['element','midi','random','tremolo','value','velocity'];

/* ── Parameter name map (from op1-params.json) ───────────── */
const PARAM_NAMES = {

  'lfo.velocity':    ['AMP','VOLUME AMOUNT','DESTINATION','PARAMETER'],
};

/* ── Scale-type metadata (from display.html) ─────────────── */
const SCALE_META = {
  percent:  { label: '%',          color: '#5B8DEF' },
  centered: { label: 'centered %', color: '#A78BFA' },
  discrete: { label: 'discrete',   color: '#34D399' },
  selector: { label: 'selector',   color: '#F59E0B' },
  hz:       { label: 'hz (log)',   color: '#F97316' },
  tempo:    { label: 'tempo dial', color: '#EC4899' },
  inverse:  { label: 'ms inverse', color: '#14B8A6' },
  decimal:  { label: 'decimal',    color: '#06B6D4' },
};

/* ── Raw→display sample table (from display.html) ────────── */
const DATA = [

  ['synth.amp', 2, 'TONE','percent',[[16704,51]]], ['synth.amp',3,'DRIVE','percent',[[16384,50]]],
  ['synth.cluster',0,'WAVE NUMBER','percent',[[3072,'min'],[17408,'max']]],['synth.cluster',1,'WAVE ENV','percent',[[0,'min'],[32767,'max']]],

  ['synth.dbox',2,'ENVELOPE 1','percent',[[0,'min'],[32767,'max']]],['synth.dbox',3,'CROSS MODULATION','percent',[[0,'min'],[32767,'max']]],
  ['synth.dbox',4,'FREQUENCY','percent',[[0,'min'],[32767,'max']]],['synth.dbox',5,'WAVEFORM 2','percent',[[0,'min'],[32767,'max']]],
  ['synth.dbox',6,'ENVELOPE 2','percent',[[0,'min'],[32767,'max']]],['synth.dbox',7,'CUTOFF','percent',[[0,'min'],[32767,'max']]],
  ['dbox.dyna_env',0,'ATTACK','centered',[[-32768,'min'],[32767,'max']]],['dbox.dyna_env',1,'GAIN','percent',[[0,'min'],[8192,'max']]],
  ['dbox.dyna_env',2,'RELEASE','centered',[[-32768,'min'],[32767,'max']]],['dbox.dyna_env',3,'SMOOTH','percent',[[0,'min'],[32767,'max']]],

/* ── Value formatting ────────────────────────────────────── */
function nearestSample(samples, v) {
  if (!samples || !samples.length) return null;
  let best = samples[0];
  for (const s of samples) if (Math.abs(s[0] - v) < Math.abs(best[0] - v)) best = s;
  return best[1];
}
function fmtValue(eng, idx, raw) {
  const e = LOOKUP[eng + '|' + idx];
  const [min, max] = getRange(eng, idx);
  if (eng === 'adsr' && idx === 7) return Math.floor(raw / 32767 * 100); // VOLUME 1–100
  if (!e) { const p = Math.round((raw - min) / (max - min || 1) * 100); return p + '%'; }
  if (e.scale === 'selector') return nearestSample(e.samples, raw);
  if (e.scale === 'centered') { const p = Math.round(raw / 32767 * 100); return (p > 0 ? '+' : '') + p + '%'; }
  if (e.scale === 'percent') { let p = Math.round((raw - min) / (max - min || 1) * 100); p = Math.max(0, Math.min(100, p)); return p + '%'; }
  // discrete / decimal / hz / tempo / inverse → show known points exactly; else raw is the truth
  const exact = e.samples.find(s => s[0] === raw);
  return exact ? exact[1] : '';
}
function fillPct(eng, idx, raw) {
  const [min, max] = getRange(eng, idx);
  let p;
  if (LOOKUP[eng + '|' + idx] && LOOKUP[eng + '|' + idx].scale === 'centered') p = raw / 32767 * 50 + 50;
  else p = (raw - min) / (max - min || 1) * 100;
  return Math.max(0, Math.min(100, p));
}
function scaleChip(eng, idx) {
  const e = LOOKUP[eng + '|' + idx];
  if (!e) return '';
  const m = SCALE_META[e.scale] || { label: e.scale };

function poly(fn, x0, x1, mid, amp, steps) {
  const pts = [];
  for (let i = 0; i <= steps; i++) { const t = i / steps; pts.push((x0 + (x1 - x0) * t).toFixed(1) + ',' + (mid - amp * fn(t)).toFixed(1)); }
  return pts.join(' ');

/* ── ADSR scope geometry ─────────────────────────────────── */
const SC = { W: 560, H: 200, padL: 24, padR: 24, padT: 22, padB: 30, maxT: 16320 };
SC.plotW = SC.W - SC.padL - SC.padR;
SC.baseY = SC.H - SC.padB;
SC.topY = SC.padT;
SC.segMax = SC.plotW * 0.26;
SC.holdW = SC.plotW * 0.16;
function ease(t) { const k = 3.2; return (1 - Math.exp(-k * t)) / (1 - Math.exp(-k)); }
function computeEnv() {
  const a = state.adsr[0], d = state.adsr[1], s = state.adsr[2], r = state.adsr[3];
  const aw = Math.max(6, a / SC.maxT * SC.segMax);
  const dw = d / SC.maxT * SC.segMax;
  const rw = r / SC.maxT * SC.segMax;
  const x0 = SC.padL, x1 = x0 + aw, x2 = x1 + dw, x3 = x2 + SC.holdW, x4 = x3 + rw;
  const susY = SC.baseY - (s / 32767) * (SC.baseY - SC.topY);
  return { x0, x1, x2, x3, x4, susY, baseY: SC.baseY, topY: SC.topY };
}
function envPath(g) {
  const N = 18, seg = (x0, y0, x1, y1) => {
    let p = '';
    for (let i = 1; i <= N; i++) { const t = i / N; p += ` L${(x0 + (x1 - x0) * t).toFixed(1)} ${(y0 + (y1 - y0) * ease(t)).toFixed(1)}`; }
    return p;
  };
  let d = `M${g.x0} ${g.baseY}`;
  d += seg(g.x0, g.baseY, g.x1, g.topY);
  d += seg(g.x1, g.topY, g.x2, g.susY);
  d += ` L${g.x3.toFixed(1)} ${g.susY.toFixed(1)}`;
  d += seg(g.x3, g.susY, g.x4, g.baseY);
  return d;
}
function scopeHtml() {
  const gx = [];
  for (let i = 1; i < 5; i++) gx.push(`<line class="env-grid" x1="${SC.padL + SC.plotW * i / 5}" y1="${SC.topY - 6}" x2="${SC.padL + SC.plotW * i / 5}" y2="${SC.baseY}"/>`);
  return `<div class="scope-card">
    <div class="scope-head"><span class="scope-title">ADSR Envelope</span><span class="scope-sub">drag the points · arrow keys to nudge</span></div>
    <svg class="scope-svg" id="scopeSvg" viewBox="0 0 ${SC.W} ${SC.H}">
      ${gx.join('')}
      <line class="env-grid" x1="${SC.padL}" y1="${SC.baseY}" x2="${SC.W - SC.padR}" y2="${SC.baseY}"/>
      <path class="env-fill" id="envFill"/>
      <path class="env-line env-glow" id="envLine"/>
      <circle class="handle" id="h-a" r="7" tabindex="0" role="slider" aria-label="Attack"></circle>
      <circle class="handle" id="h-ds" r="7" tabindex="0" role="slider" aria-label="Decay and sustain"></circle>
      <circle class="handle" id="h-r" r="7" tabindex="0" role="slider" aria-label="Release"></circle>
    </svg>
    <div class="scope-readout" id="scopeReadout"></div>
  </div>`;
}
function drawScope() {
  const g = computeEnv();
  const line = document.getElementById('envLine');
  if (!line) return;
  const d = envPath(g);
  line.setAttribute('d', d);
  document.getElementById('envFill').setAttribute('d', d + ` L${g.x4} ${g.baseY} Z`);
  const set = (id, x, y) => { const el = document.getElementById(id); el.setAttribute('cx', x); el.setAttribute('cy', y); };
  set('h-a', g.x1, g.topY); set('h-ds', g.x2, g.susY); set('h-r', g.x4, g.baseY);
  const ro = document.getElementById('scopeReadout');
  const cell = (i) => `<div class="ro">${PARAM_NAMES.adsr[i]}<b>${state.adsr[i]} <span class="rd">${fmtValue('adsr', i, state.adsr[i])}</span></b></div>`;
  ro.innerHTML = cell(0) + cell(1) + cell(2) + cell(3);
}
function svgCoords(svg, ev) {
  const rect = svg.getBoundingClientRect();
  return { x: (ev.clientX - rect.left) / rect.width * SC.W, y: (ev.clientY - rect.top) / rect.height * SC.H };
}
const clampI = (v, lo, hi) => Math.max(lo, Math.min(hi, Math.round(v)));
function applyHandle(h, x, y) {
  if (h === 'a') {
    state.adsr[0] = clampI((x - SC.padL) / SC.segMax * SC.maxT, 64, 16320);
  } else if (h === 'ds') {
    const g = computeEnv();
    state.adsr[1] = clampI((x - g.x1) / SC.segMax * SC.maxT, 64, 16320);
    state.adsr[2] = clampI((g.baseY - y) / (g.baseY - g.topY) * 32767, 0, 32767);
  } else if (h === 'r') {
    const g = computeEnv();
    state.adsr[3] = clampI((x - g.x3) / SC.segMax * SC.maxT, 64, 16320);
  }
  drawScope();
  syncEditor();
}

/* ── LFO PARAMETER selector (context-dependent on DESTINATION) ──
   The PARAMETER knob picks which knob of the DESTINATION the LFO modulates,
   so its options are that destination's parameter names. Raw encodings
   (from oracle captures + display-notes.md):
     4-param targets : 1024 / 4864 / 8704 / 15360
     8-param synths  : 1024 / 2944 / 4384 / 6304 / 8224 / 10624 / 13024 / 15360
     dbox synth      : 1024 / 2464 / 4384 / 6304 / 8224 / 10624 / 12544 / 14464
   DESTINATION resolves to the synth/fx engine's knobs, the envelope
   (ADSR — or the dbox dynamic envelope), or the mix bus. */
const PARAM_STEPS_4 = [1024, 4864, 8704, 15360];
const PARAM_STEPS_8 = [1024, 2944, 4384, 6304, 8224, 10624, 13024, 15360];
const PARAM_STEPS_DBOX = [1024, 2464, 4384, 6304, 8224, 10624, 12544, 14464];
const DEST_ENVELOPE = ['ATTACK', 'DECAY', 'SUSTAIN', 'RELEASE'];
const DEST_ENVELOPE_DBOX = ['ATTACK', 'GAIN', 'RELEASE', 'SMOOTH'];
const DEST_MIX = ['VOLUME', 'PITCH', 'PAN', null];
const LFO_DEST_PARAM = { element: { d: 2, p: 3 }, value: { d: 2, p: 3 }, velocity: { d: 2, p: 3 } };
function destNames(label) {
  if (label == null) return null;
  const base = String(label).replace(' free', '');
  if (base === 'synth') return PARAM_NAMES['synth.' + state.type] || null;
  if (base === 'fx') return PARAM_NAMES['fx.' + state.fx_type] || null;
  if (base === 'envelope') return isDbox() ? DEST_ENVELOPE_DBOX : DEST_ENVELOPE;
  if (base === 'mix' || base === 'sound output') return DEST_MIX;
  return null;
}
function lfoParamSamples(lfoType, idx) {
  const cfg = LFO_DEST_PARAM[lfoType];
  if (!cfg || idx !== cfg.p) return null;
  const destEntry = LOOKUP['lfo.' + lfoType + '|' + cfg.d];
  if (!destEntry) return null;
  const label = nearestSample(destEntry.samples, state.lfo_params[cfg.d]);
  const names = destNames(label);
  if (!names) return null;
  const active = names.map((n, i) => n === null ? -1 : i).filter(i => i >= 0);
  const synthDbox = state.type === 'dbox' && label != null && String(label).replace(' free', '') === 'synth';
  const steps = synthDbox ? PARAM_STEPS_DBOX : (active.length > 4 ? PARAM_STEPS_8 : PARAM_STEPS_4);
  return active.map((pi, k) => [steps[k] != null ? steps[k] : 15360, names[pi]]);
}

/* ── Parameter rows ──────────────────────────────────────── */
function rowHtml(grp, eng, idx, raw) {
  const name = PARAM_NAMES[eng][idx];
  const [min, max] = getRange(eng, idx);
  const e = LOOKUP[eng + '|' + idx];
  let samples = e ? e.samples : null;
  if (grp === 'lfo') { const dyn = lfoParamSamples(state.lfo_type, idx); if (dyn) samples = dyn; }
  const isSel = !!(e && e.scale === 'selector' && samples);
  const valLbl = isSel ? nearestSample(samples, raw) : fmtValue(eng, idx, raw);
  // selector → dropdown of known options
  let ctl;
  if (isSel && samples.length > 1) {
    const opts = samples.map(([rv, dv]) => `<option value="${rv}" ${rv === raw ? 'selected' : ''}>${dv} (${rv})</option>`).join('');
    const exact = samples.some(s => s[0] === raw);
    const nearLbl = nearestSample(samples, raw);
    ctl = `<select class="pselect asel" data-grp="${grp}" data-idx="${idx}">${opts}${exact ? '' : `<option value="${raw}" selected>~${nearLbl} (${raw})</option>`}</select>`;
  } else {
    ctl = `<input type="range" class="ctl" data-grp="${grp}" data-idx="${idx}" min="${min}" max="${max}" value="${raw}">
      <input type="number" class="rawin ctl" data-grp="${grp}" data-idx="${idx}" min="${min}" max="${max}" value="${raw}">`;
  }
  return `<div class="prow">
    <div class="prow-top">
      <span class="pname">${name}</span><span class="pidx">#${idx}</span>${scaleChip(eng, idx)}
      <span class="pval" data-val="${grp}-${idx}">${valLbl == null ? '' : valLbl}</span>
    </div>
    <div class="prow-ctl">${ctl}</div>
  </div>`;
}
function groupHtml(grp, label, arrKey, engPrefix, typeKey, typeList) {
  const type = state[typeKey];
  const eng = engPrefix + '.' + type;
  const names = PARAM_NAMES[eng] || [];
  const active = names.map((n, i) => n === null ? -1 : i).filter(i => i >= 0);
  const arr = state[arrKey] || [];
  const sel = `<select class="gsel" data-typekey="${typeKey}">${typeList.map(t => `<option value="${t}" ${t === type ? 'selected' : ''}>${t}</option>`).join('')}</select>`;
  let toggle = '';
  if (arrKey === 'fx_params') toggle = `<label class="toggle"><input type="checkbox" class="actv" data-key="fx_active" ${state.fx_active ? 'checked' : ''}>active</label>`;
  if (arrKey === 'lfo_params') toggle = `<label class="toggle"><input type="checkbox" class="actv" data-key="lfo_active" ${state.lfo_active ? 'checked' : ''}>active</label>`;
  const off = (arrKey === 'fx_params' && !state.fx_active) || (arrKey === 'lfo_params' && !state.lfo_active);
  const rows = active.map(i => rowHtml(grp, eng, i, arr[i] != null ? arr[i] : 0)).join('');
  return `<div class="pgroup ${off ? 'off' : ''}">
    <div class="pgroup-head"><h2>${label}</h2>${sel}${toggle}</div>${rows}</div>`;
}
function adsrExtrasHtml() {
  const rows = [4, 5, 6, 7].map(i => rowHtml('adsr', 'adsr', i, state.adsr[i] != null ? state.adsr[i] : 0)).join('');
  return `<div class="pgroup"><div class="pgroup-head"><h2>Keyboard / ADSR</h2></div>${rows}</div>`;
}
function dboxHtml() {
  const dyna = state.dyna_env || [0,0,0,0,0,0,0,0];
  const cell = (i) => {
    const e = LOOKUP['dbox.dyna_env|' + i];
    const [min, max] = e.scale === 'centered' ? [-32768, 32767] : (i === 1 ? [0, 8192] : [0, 32767]);
    return `<div class="dyna-cell"><div class="dn">${e.name}</div><div class="dv">${dyna[i]}</div><div class="dr">${min} … ${max}</div></div>`;

    <div class="dbox-note"><b>Drum patch.</b> This engine stores ${pads} pads × 8 parameters in <b>dbox_data</b> and uses a dynamic envelope instead of ADSR. Per-pad editing is out of scope for now — edit the JSON directly to change pads. FX and LFO below remain fully editable.</div>
    <div class="dyna-grid">${[0,1,2,3].map(cell).join('')}</div>
  </div>`;

/* ── Render ──────────────────────────────────────────────── */
function render() {
  document.getElementById('idArt').innerHTML = engineArt(state.type);
  document.getElementById('idEngine').textContent = state.type;

    colA += dboxHtml();
  } else {
    colA += scopeHtml();
    colA += groupHtml('knobs', 'Synth', 'knobs', 'synth', 'type', SYNTH_TYPES);
  }

function refreshRow(grp, idx) {
  let eng;
  if (grp === 'knobs') eng = 'synth.' + state.type;
  else if (grp === 'fx') eng = 'fx.' + state.fx_type;
  else if (grp === 'lfo') eng = 'lfo.' + state.lfo_type;
  else eng = 'adsr';
  const arr = grp === 'knobs' ? state.knobs : grp === 'fx' ? state.fx_params : grp === 'lfo' ? state.lfo_params : state.adsr;
  const raw = arr[idx];
  document.querySelectorAll(`.ctl[data-grp="${grp}"][data-idx="${idx}"]`).forEach(el => { if (document.activeElement !== el) el.value = raw; });
  const lbl = document.querySelector(`[data-val="${grp}-${idx}"]`);
  if (lbl) { const v = fmtValue(eng, idx, raw); lbl.textContent = v == null ? '' : v; }

/* ── JSON serialize / pretty-print (alphabetical keys) ───── */
function fmtScalar(x) { return JSON.stringify(x); }
function fmtVal(v, depth) {
  if (Array.isArray(v)) {
    if (v.length && Array.isArray(v[0])) {
      const ind = '  '.repeat(depth + 1);
      return '[\n' + v.map(row => ind + '[' + row.map(fmtScalar).join(', ') + ']').join(',\n') + '\n' + '  '.repeat(depth) + ']';
    }
    return '[' + v.map(fmtScalar).join(', ') + ']';
  }
  if (v && typeof v === 'object') {
    const ks = Object.keys(v).sort();
    const ind = '  '.repeat(depth + 1);
    return '{\n' + ks.map(k => ind + JSON.stringify(k) + ': ' + fmtVal(v[k], depth + 1)).join(',\n') + '\n' + '  '.repeat(depth) + '}';
  }
  return fmtScalar(v);
}
function pretty(obj) {
  const ks = Object.keys(obj).sort();
  return '{\n' + ks.map(k => '  ' + JSON.stringify(k) + ': ' + fmtVal(obj[k], 1)).join(',\n') + '\n}';
}

/* ── Syntax highlighting ─────────────────────────────────── */
const hlCode = document.querySelector('#jsonHighlight code');
function highlight(text) {
  let esc = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  esc = esc.replace(/("(?:\\.|[^"\\])*")(\s*:)?|\b(true|false|null)\b|(-?\d+\.?\d*(?:[eE][+-]?\d+)?)/g,
    (m, str, colon, kw, num) => {
      if (str != null) return colon != null
        ? `<span class="tok-key">${str}</span><span class="tok-punct">${colon}</span>`
        : `<span class="tok-str">${str}</span>`;
      if (kw != null) return `<span class="tok-bool">${kw}</span>`;
      if (num != null) return `<span class="tok-num">${num}</span>`;
      return m;
    });
  hlCode.innerHTML = esc + '\n';
}

/* ── Editor sync ─────────────────────────────────────────── */
const jsonInput = document.getElementById('jsonInput');
const statusEl = document.getElementById('status');
function setStatus(msg, ok) { statusEl.textContent = msg; statusEl.className = 'editor-status ' + (ok ? 'ok' : 'err'); }
function syncEditor() {
  const txt = pretty(state);
  jsonInput.value = txt;
  highlight(txt);
  setStatus('In sync · ' + Object.keys(state).length + ' keys', true);
}
function liveParse() {
  highlight(jsonInput.value);
  let parsed;
  try { parsed = JSON.parse(jsonInput.value); }
  catch (err) { setStatus('Invalid JSON: ' + err.message, false); return; }
  if (typeof parsed !== 'object' || Array.isArray(parsed) || parsed === null) { setStatus('Expected a JSON object', false); return; }
  state = normalize(parsed);
  setStatus('Parsed OK · ' + Object.keys(state).length + ' keys', true);
  render();
}
function loadPreset(obj) {
  state = normalize(clone(obj));
  syncEditor();
  render();
}

['dragenter', 'dragover'].forEach(ev => editorWrap.addEventListener(ev, e => { e.preventDefault(); editorWrap.classList.add('drag'); }));

/* ── Identity controls ───────────────────────────────────── */
document.getElementById('nameInput').addEventListener('input', e => { state.name = e.target.value; syncEditor(); });
document.getElementById('octSel').addEventListener('change', e => { state.octave = parseInt(e.target.value, 10); syncEditor(); });

/* ── Delegated control handlers (viz panel) ──────────────── */
const viz = document.getElementById('viz');
function arrFor(grp) {
  return grp === 'knobs' ? state.knobs : grp === 'fx' ? state.fx_params : grp === 'lfo' ? state.lfo_params : state.adsr;
}
viz.addEventListener('input', e => {
  const t = e.target;
  if (t.classList.contains('ctl')) {
    const grp = t.dataset.grp, idx = +t.dataset.idx;
    let v = parseInt(t.value, 10);
    if (isNaN(v)) return;
    arrFor(grp)[idx] = v;
    refreshRow(grp, idx);
    syncEditor();
  }
});
viz.addEventListener('change', e => {
  const t = e.target;
  if (t.classList.contains('gsel')) {            // engine type switch
    state[t.dataset.typekey] = t.value;
    syncEditor(); render();
  } else if (t.classList.contains('asel')) {     // selector dropdown
    const grp = t.dataset.grp, idx = +t.dataset.idx;
    arrFor(grp)[idx] = parseInt(t.value, 10);
    syncEditor();
    // LFO DESTINATION drives the PARAMETER options/labels → rebuild the group
    if (grp === 'lfo') render(); else refreshRow(grp, idx);
  } else if (t.classList.contains('actv')) {     // fx/lfo active toggle
    state[t.dataset.key] = t.checked;
    syncEditor(); render();
  }
});

/* ── ADSR scope: pointer + keyboard (delegated, stable) ──── */
viz.addEventListener('pointerdown', e => {
  const h = e.target.closest('.handle');
  if (!h) return;
  const svg = document.getElementById('scopeSvg');
  const hid = h.id.slice(2);
  h.setPointerCapture(e.pointerId);
  const move = ev => { const { x, y } = svgCoords(svg, ev); applyHandle(hid, x, y); };
  const up = () => { try { h.releasePointerCapture(e.pointerId); } catch (_) {} window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
  window.addEventListener('pointermove', move);
  window.addEventListener('pointerup', up);
});
viz.addEventListener('keydown', e => {
  const h = e.target.closest && e.target.closest('.handle');
  if (!h) return;
  const hid = h.id.slice(2);
  const stepT = 400, stepS = 1200;
  let used = true;
  const adj = (i, d, lo, hi) => { state.adsr[i] = clampI(state.adsr[i] + d, lo, hi); };
  if (hid === 'a') { if (e.key === 'ArrowRight') adj(0, stepT, 64, 16320); else if (e.key === 'ArrowLeft') adj(0, -stepT, 64, 16320); else used = false; }
  else if (hid === 'ds') {
    if (e.key === 'ArrowRight') adj(1, stepT, 64, 16320); else if (e.key === 'ArrowLeft') adj(1, -stepT, 64, 16320);
    else if (e.key === 'ArrowUp') adj(2, stepS, 0, 32767); else if (e.key === 'ArrowDown') adj(2, -stepS, 0, 32767); else used = false;
  } else if (hid === 'r') { if (e.key === 'ArrowRight') adj(3, stepT, 64, 16320); else if (e.key === 'ArrowLeft') adj(3, -stepT, 64, 16320); else used = false; }
  if (used) { e.preventDefault(); drawScope(); syncEditor(); }
});

/* ── Init ────────────────────────────────────────────────── */
loadPreset(SAMPLES[Object.keys(SAMPLES)[0]]);
</script>
</body>
